<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemento span</title>
</head>
<body>
    <h1>Tooltip en una palabra</h1>

    <p>
        Pon el cursor <span title="Un tooltip"><b>aquí</b></span> 
        para ver un tooltip.
    </p>
</body>
</html>
