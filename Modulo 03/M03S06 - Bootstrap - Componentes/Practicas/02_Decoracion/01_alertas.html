<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Alertas</title>
</head>
<body>

    <!-- Podemos crear alertas de distintos colores: .alert .alert-{color} -->
    <div class="container my-5 py-3 border border-dark">
        <h4>Alertas normales</h4>
        <div class="alert alert-success">
            Mensaje de alerta
        </div>
        <div class="alert alert-warning">
            Mensaje de alerta
        </div>
        <div class="alert alert-danger">
            Mensaje de alerta
        </div>
        <div class="alert alert-primary">
            Mensaje de alerta
        </div>
        <div class="alert alert-dark">
            Mensaje de alerta
        </div>
        <div class="alert alert-secondary">
            Mensaje de alerta
        </div>
        
    </div>


    <!-- Alertas que se puedan cerrar: .alert-dismissible -->
    <div class="container my-5  py-3 border border-dark">
        <h4>Alertas que se pueden cerrar</h4>
        <div class="alert alert-success alert-dismissible">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            Mensaje de alerta
        </div>
        <div class="alert alert-warning alert-dismissible">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            Mensaje de alerta
        </div>
        <div class="alert alert-danger alert-dismissible">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            Mensaje de alerta
        </div>

    </div>
    
</body>
</html>
