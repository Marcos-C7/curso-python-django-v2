<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclases de estado - CSS</title>
    <style>
        body {
            margin: 0px;
        }

        .titulo {
            color: hsl(74, 88%, 90%);
            background-color: hsl(130, 8%, 15%);
            margin: 0px;
            padding: 20px
        }

        .formulario {
            background-color: hsl(131, 13%, 80%);
            padding: 20px;
            margin: 10px
        }

        .campo-form {
            margin-bottom: 20px;
        }

        input:hover {
            border-color:hsl(131, 13%, 20%);
            background-color: hsl(60, 82%, 75%);
        }
        input:focus {
            background-color: hsl(203, 83%, 75%);
        }
        input:required {
            background-color: hsl(23, 83%, 75%);
        }

        button {
            background-color: hsl(23, 75%, 55%);
        }
        button:hover {
            background-color: hsl(23, 75%, 70%);
        }
        button:disabled {
            background-color: hsl(202, 30%, 65%);
            color: hsl(202, 30%, 40%);
        }
    </style>
</head>
<body>
    <!-- Para no alargar mucho el ejemplo no veremos 'checked'  -->
    <h1 class="titulo">Pseudoclases de estado</h1>

    <form class="formulario">
        <div class="campo-form">
            <label for="asunto">Asunto:</label>
            <input type="text" name="asunto" id="asunto" required>
        </div>
        <div class="campo-form">
            <label for="email">Email:</label>
            <input type="text" name="email" id="email">
        </div>
        <button type="button" class="boton-enviar">Enviar</button>
        <button type="button" class="boton-enviar" disabled>cancelar</button>
    </form>
</body>
</html>
