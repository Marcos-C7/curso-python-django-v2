<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos bloque y en línea - HTML</title>
</head>
<body>
    <h1>Elemento en bloque</h1>
    <p>
        Un elemento en bloque, <div><mark>como este</mark></div>, reserva todo 
        el ancho disponible en la página.
    </p>

    <h1>Elemento en línea</h1>
    <p>Un elemento en línea, <mark>como este</mark>, solo ocupa el espacio necesario.</p>

</body>
</html>
