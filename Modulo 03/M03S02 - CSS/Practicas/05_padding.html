<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padding - CSS</title>
</head>
<body>
    <h1>Padding</h1>

    <div style="
        border: 1px solid black; 
        background-color: hsl(137, 28%, 90%);
        padding: 0px;"
        >
        <span style="border: 1px solid black;">padding: 0px</span>
    </div>
    <br>
    <!-- A continuación vemos como interactúa el modelo de cada de un elemento
        tipo inline 
    -->
    <div style="
        border: 1px solid black; 
        background-color: hsl(137, 28%, 90%);
        padding: 10px;"
        >
        <span style="border: 1px solid black;">padding: 10px</span>
    </div>
    <br>
    <!-- A continuación podemos ver como el margen por defecto de <p> y el
        hecho de ser elemento block entran en juego en el modelo de caja
    -->
    <div style="
        border: 1px solid black; 
        background-color: hsl(137, 28%, 90%);
        padding: 10px;"
        >
        <p style="border: 1px solid black;">padding: 10px</p>
    </div>
    <br>
</body>
</html>
