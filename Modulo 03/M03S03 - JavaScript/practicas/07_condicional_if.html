<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condicional if - JavaScript</title>
</head>
<body>
    <h1>Condicional if</h1>
    <p>Revisa el mensaje en la consola</p>

    <script>

        let edad = 18;

        if (edad < 18) {
            console.log("Eres menor de edad");
        } else if (edad === 18) {
            console.log("Acabas de cumplir 18 años");
        } else {
            console.log("Eres mayor de edad");
        }

    </script>
</body>
</html>
