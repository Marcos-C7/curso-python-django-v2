<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin - CSS</title>
</head>
<body>
    <h1>Margin</h1>

    <div style="
        border: 1px solid black; 
        background-color: hsl(137, 28%, 90%);
        padding: 5px;
        margin: 0px;"
        >
        margin: 0px
    </div>
    <div style="
        border: 1px solid black; 
        background-color: hsl(137, 28%, 90%);
        padding: 5px;
        margin: 10px;"
        >
        margin: 10px
    </div>
    <div style="
        border: 1px solid black; 
        background-color: hsl(137, 28%, 90%);
        padding: 5px;
        margin: 20px;"
        >
        margin: 20px
    </div>
    
</body>
</html>
