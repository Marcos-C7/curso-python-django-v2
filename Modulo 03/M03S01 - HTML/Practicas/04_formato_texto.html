<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de formato</title>
</head>
<body>
    <h1>Elementos de formato para texto</h1>

    <p>texto <b>en negrita</b></p>
    <p>texto <i>en cursiva</i></p>
    <p>texto <mark>resaltado</mark></p>
    <p>texto <small>pequeño</small></p>
    <p>texto <u>subrayado</u></p>
    <p>texto <del>eliminado</del></p>
    <p>texto <sub>subíndice</sub></p>
    <p>texto <sup>superíndice</sup></p>
</body>
</html>
