

<!-- Indica al navegador que tiene que renderizar como página Web -->
<!DOCTYPE html>
<!-- Idioma de la página, solo informativo para otras herramientas -->
<html lang="en">
<!-- Información y configuración de la página -->
<head>
    <!-- Codificación de caracteres del documento -->
    <meta charset="UTF-8">
    <!-- Ajuste del viewport (área visible) para usar el 
     ancho real del dispositivo y no aplicar zoom inicial -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título de la página -->
    <title>Estructura básica HTML</title>
</head>
<!-- Elemento raiz del área visible -->
<body>
    <!-- CONTENIDO VISIBLE -->
    HOLA
</body>
</html>
