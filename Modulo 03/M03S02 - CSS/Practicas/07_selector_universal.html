<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector universal - CSS</title>
    <style>
        * {
            color: rgb(89, 66, 6);
            background-color:rgb(220, 178, 73);
        }
    </style>
</head>
<body>
    <!-- En este ejemplo también podemos ver como aplicar estilos mediante
        el bloque <style> 
    -->
    <h1>Selector universal</h1>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Exercitationem 
        debitis sapiente fugiat aliquid, reiciendis, adipisci cumque quaerat 
        pariatur recusandae eveniet illo eum dicta placeat, illum magni atque l
        aborum! Qui, eos?
    </p>
</body>
</html>
