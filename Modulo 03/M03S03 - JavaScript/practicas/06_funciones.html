<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones - JavaScript</title>
</head>
<body>
    <h1>Funciones</h1>
    <p>Revisa el mensaje en la consola</p>

    <script>
        function saludar(nombre) {
            console.log("Hola, " + nombre + "!");
        }

        function sumar(a, b) {
            return a + b;
        }

        saludar("Juan");
        saludar("María");
        console.log("La suma de 5 y 3 es: " + sumar(5, 3));
    </script>
</body>
</html>
