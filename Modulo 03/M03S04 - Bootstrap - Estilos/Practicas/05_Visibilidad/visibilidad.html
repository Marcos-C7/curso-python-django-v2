<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="estilos.css">
    <title>Visibilidad</title>
</head>
<body>
    <div style="width:400px; margin:auto; margin-top:30px;">
        <h2 style="text-align: center;">Visibilidad</h2>
        <div>
            <span class="bg-danger invisible"></span>
            <span class="bg-success visible"></span>
            <span class="bg-warning visible"></span>
        </div>
        <div>
            <span class="bg-danger visible"></span>
            <span class="bg-success invisible"></span>
            <span class="bg-warning visible"></span>
        </div>
        <div>
            <span class="bg-danger visible"></span>
            <span class="bg-success visible"></span>
            <span class="bg-warning invisible"></span>
        </div>
    </div>
</body>
</html>
