<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectores JavaScript - JavaScript</title>
</head>
<body>
    <h1>Selectores JavaScript</h1>
    
    <p>Este texto va a cambiar automáticamente</p>

    <script>
        // Seleccionar el elemento <p> y cambiar su contenido
        let parrafo = document.querySelector("p");
        parrafo.textContent = "El texto ha sido cambiado por JavaScript";
    </script>
    
</body>
</html>
