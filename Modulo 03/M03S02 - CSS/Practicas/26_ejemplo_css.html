<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi página</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav li {
      display: inline;
      margin: 0 15px;
      color: white;
    }

    main {
      padding: 20px;
    }

    section {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
    }

    form input, form textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      background: #333;
      color: white;
      padding: 10px 15px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

  </style>

</head>
<body>

  <header>
    <h1>Mi sitio web</h1>
  </header>

  <nav>
    <ul>
      <li>Inicio</li>
      <li>Servicios</li>
      <li>Contacto</li>
    </ul>
  </nav>

  <main>

    <section>
      <h2>Bienvenido</h2>
      <p>
        Esta es una página de ejemplo con estilos CSS.
      </p>
    </section>

    <section>
      <h2>Contacto</h2>
      <form>
        <label>Nombre:</label>
        <input type="text">

        <label>Mensaje:</label>
        <textarea></textarea>

        <button>Enviar</button>
      </form>
    </section>

  </main>

</body>
</html>
