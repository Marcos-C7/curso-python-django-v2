<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display: block e inline - CSS</title>
    <style>
        .contenedor {
            background-color: hsl(160, 50%, 82%);
            padding: 10px;
        }

        .texto {
            background-color: hsl(240, 69%, 76%);
            margin: 5px;
            display: block; /* cambiar aquí entre block e inline*/
        }
    </style>
</head>
<body>
    <h1>Display: block e inline</h1>

    <div class="contenedor">
        <p class="texto">Párrafo</p>
        <p class="texto">Párrafo</p>
    </div>

</body>
</html>
