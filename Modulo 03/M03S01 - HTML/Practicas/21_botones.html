<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botones</title>
</head>
<body>
    <!-- Al presionar el botón no se recarga la página (no se envía el formulario) -->
     <h2>Botón simple</h2>
    <form>
        <button type="button">Enviar</button>
    </form>
    
    <h2>Botón deshabilitado</h2>
    <form>
        <button disabled>Enviar</button>
    </form>

    <!-- Al presionar el botón se recarga la página (se envía el formulario) -->
    <h2>Botón compuesto</h2>
    <form method="get">
        <button type="submit">
            <img src="img/upload.png" height="10px">
            Enviar
        </button>
    </form>

    <!-- Podemos mediante el método GET que el formulario se envía -->
    <br><br>
    <h2>Comprobación con método GET</h2>
    <form method="get">
        <label for="edad">ID:</label>
        <input type="number" id="edad" name="edad">
        <br>
        <label for="estatura">Estatura:</label>
        <input type="number" id="estatura" name="estatura">
        <br>

        <button type="submit">
            <img src="img/upload.png" height="10px">
            Enviar
        </button>
    </form>
</body>
</html>
