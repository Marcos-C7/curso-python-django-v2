<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unión de selectores - CSS</title>
    <style>
        .titulo, .subtitulo {
            background-color: rgb(59, 104, 1);
            color: rgb(236, 221, 9);
        }
    </style>
</head>
<body>
    <h1>Unión de selectores</h1>

    <div>
        <div class="titulo">Titulo</div>
        <div class="subtitulo">Subtitulo</div>
        <div class="texto">Texto</div>
        <div class="subtitulo">Subtitulo</div>
    </div>
</body>
</html>
