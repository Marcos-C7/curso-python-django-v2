<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control input - HTML</title>
</head>
<body>
    <h1>Controles input</h1>

    <form validate>
        
        <span>Tipo texto:</span>
        <input type="text">
        <br>
        <span>Tipo password:</span>
        <input type="password">
        <br>
        <span>Tipo email:</span>
        <input type="email">
        <br>
        <span>Tipo search:</span>
        <input type="search">
        <br>
        <span>Tipo url:</span>
        <input type="url">
        <br>
        <span>Tipo tel:</span>
        <input type="tel">
        <br>
        <span>Tipo number:</span>
        <input type="number">
        <br>
        <span>Tipo rango:</span>
        <input type="range">
        <br>
        <span>Tipo fecha:</span>
        <input type="date">
        <br>
        <span>Tipo mes:</span>
        <input type="month">
        <br>
        <span>Tipo hora:</span>
        <input type="time">
        <br>
        <span>Tipo fecha-hora:</span>
        <input type="datetime-local">
        <br>
        <span>Tipo checkbox:</span>
        <input type="checkbox" name="acepto">
        <br>
        <span>Tipo radio:</span>
        <input type="radio" name="genero">
        <input type="radio" name="genero">
        <input type="radio" name="genero">
        <br>
        <span>Tipo archivo:</span>
        <input type="file">
        <br>
        <span>Tipo color:</span>
        <input type="color">
        <br>
        <!-- útil para enviar datos sin mostrarlos al usuario, como Tokens -->
        <span>Tipo oculto:</span>
        <input type="hidden" name="token" value="abc123">
        <br>
        <!--  
        Los botones son de tipo button, submit o reset, cada uno tiene 
        su propósito:
        button: es un botón genérico que no tiene un comportamiento específico.
        submit: envía el formulario al servidor.
        reset: restablece los valores del formulario a sus valores iniciales.
        -->
        <span>Tipo botón:</span>
        <input type="button" value="Enviar">
        <br>
    </form>
</body>
</html>
